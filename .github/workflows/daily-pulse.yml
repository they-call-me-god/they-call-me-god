name: Daily Pulse

# Keeps a build journal and refreshes the README "Daily Pulse" block, authored
# with Shaurya's verified email so the commits count toward the contribution
# graph (bot-authored commits do not).
#
# Variance engine:
#   * The day's commit COUNT is a deterministic, date-seeded roll (light/dark
#     squares + the odd blank day) — not one identical commit every day.
#   * Those commits are spread across the day via multiple scheduled runs
#     ("slots"). Each run asks "is this slot one of today's chosen ones?" and
#     commits at most once, so commit TIMES genuinely vary instead of bursting.
#   * Every commit is a REAL diff: a timestamped line appended to the build
#     journal at .pulse/activity.md (plus the README block refresh). No empty
#     filler commits.
#
# IMPORTANT: the cron list below must stay in sync with SLOTS in the python step.

on:
  schedule:
    - cron: "11 2 * * *"
    - cron: "23 5 * * *"
    - cron: "47 7 * * *"
    - cron: "9 10 * * *"
    - cron: "31 13 * * *"
    - cron: "5 16 * * *"
    - cron: "43 18 * * *"
    - cron: "29 21 * * *"
  workflow_dispatch:
    inputs:
      profile:
        description: "Override variance profile for this manual run (natural|grinder|weekday)"
        required: false
        default: ""

permissions:
  contents: write

env:
  # natural | grinder | weekday  — see PROFILES in the python step below.
  PULSE_PROFILE: "natural"

jobs:
  pulse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Decide whether this slot commits
        run: |
          python3 - <<'PY'
          import datetime, os, random, pathlib

          # Scheduled UTC time slots — MUST match the cron list above.
          SLOTS = [(2, 11), (5, 23), (7, 47), (10, 9),
                   (13, 31), (16, 5), (18, 43), (21, 29)]

          profile = (os.environ.get("INPUT_PROFILE") or os.environ.get("PULSE_PROFILE") or "natural").strip()

          # `weights` = pool the daily commit count is drawn from (0 = blank day),
          # capped at len(SLOTS). `weekend_factor` scales it down Sat/Sun.
          PROFILES = {
              "natural": dict(weights=[0, 0, 1, 1, 1, 1, 2, 2, 2, 3, 4], weekend_factor=0.5),
              "grinder": dict(weights=[1, 1, 2, 2, 2, 3, 3, 4, 4, 5],     weekend_factor=0.8),
              "weekday": dict(weights=[0, 0, 0, 1, 1, 2, 2, 3, 4],         weekend_factor=0.25),
          }
          cfg = PROFILES.get(profile, PROFILES["natural"])

          now = datetime.datetime.utcnow()
          today = now.date()
          rng = random.Random(today.toordinal())   # deterministic per calendar day

          n = rng.choice(cfg["weights"])
          if today.weekday() >= 5:
              n = round(n * cfg["weekend_factor"])
          n = max(0, min(int(n), len(SLOTS)))

          chosen = set(rng.sample(range(len(SLOTS)), n)) if n else set()

          # Which slot does this run map to? Pick the nearest scheduled time.
          slot_times = [now.replace(hour=h, minute=m, second=0, microsecond=0) for h, m in SLOTS]
          diffs = [abs((now - st).total_seconds()) for st in slot_times]
          cur = min(range(len(SLOTS)), key=lambda i: diffs[i])
          within = diffs[cur] <= 75 * 60   # tolerate Actions scheduling lag

          manual = os.environ.get("GITHUB_EVENT_NAME") == "workflow_dispatch"
          go = manual or (within and cur in chosen)

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env:
              env.write(f"PULSE_GO={'1' if go else '0'}\n")

          if not go:
              print(f"Slot {cur} not committing today (profile '{profile}', planned slots {sorted(chosen)}).")
              raise SystemExit(0)

          # ---- this slot commits: build a real diff -------------------------
          themes = [
              ("voice agents",        "The best code is the code that writes itself."),
              ("self-learning web",   "Ship it, then make it learn."),
              ("content pipelines",   "Automate the boring, amplify the rare."),
              ("autonomous systems",  "Every project should become an autonomous system."),
              ("agent harnesses",     "Make it work, make it think, make it teach itself."),
              ("client acquisition",  "Small daily commits compound like interest."),
              ("infra & cron",        "A pipeline you trust is a pipeline you forget."),
          ]
          verbs = ["refresh", "tune", "advance", "log", "update", "iterate on",
                   "note", "polish", "wire up", "rework", "trim", "extend"]

          # Seed message/theme by (day, slot) so each slot reads differently.
          srng = random.Random(today.toordinal() * 100 + cur)
          focus, q = srng.choice(themes)
          verb = srng.choice(verbs)
          stamp = now.strftime("%Y-%m-%d %H:%M UTC")
          day_of_year = today.timetuple().tm_yday

          # 1) append to the build journal (the real change)
          log = pathlib.Path(".pulse/activity.md")
          log.parent.mkdir(exist_ok=True)
          if not log.exists():
              log.write_text("# Build journal\n\nAuto-logged focus + intent, one line per working session.\n\n", encoding="utf-8")
          with log.open("a", encoding="utf-8") as f:
              f.write(f"- {stamp} — {focus} — _{q}_\n")

          # 2) refresh the README pulse block (skip gracefully if README/markers absent)
          import re
          readme = pathlib.Path("README.md")
          if readme.exists():
              block = (
                  f"**{today.strftime('%A, %d %b %Y')}** &nbsp;•&nbsp; Day {day_of_year} of {today.year} "
                  f"&nbsp;•&nbsp; focus: {focus}\n\n"
                  f"> _{q}_\n\n"
                  f"![Building](https://img.shields.io/badge/status-building%20autonomous%20systems-6366f1?style=flat-square)"
              )
              md = readme.read_text(encoding="utf-8")
              md = re.sub(
                  r"<!--PULSE:START-->.*?<!--PULSE:END-->",
                  f"<!--PULSE:START-->\n{block}\n<!--PULSE:END-->",
                  md, flags=re.S,
              )
              readme.write_text(md, encoding="utf-8")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env:
              env.write(f"PULSE_MSG=docs(pulse): {verb} {focus} — day {day_of_year}\n")
          print(f"Slot {cur} committing: {verb} {focus}")
          PY
        env:
          INPUT_PROFILE: ${{ github.event.inputs.profile }}

      - name: Commit (attributed to Shaurya, jittered)
        if: env.PULSE_GO == '1'
        run: |
          git config user.name  "Shaur"
          git config user.email "shauryavardhan.shandilya@gmail.com"

          # Small in-slot jitter (0-20 min) so the timestamp isn't exactly on the cron tick.
          sleep $(( RANDOM % 1200 ))

          git add .pulse/activity.md
          [ -f README.md ] && git add README.md
          git commit -m "${PULSE_MSG:-docs: daily pulse $(date -u +%F)}" || { echo "nothing to commit"; exit 0; }

          # Another slot may have pushed earlier today; rebase then push, retrying
          # the rebase+push cycle if the remote moved again between the two.
          branch="$(git rev-parse --abbrev-ref HEAD)"
          for attempt in 1 2 3; do
            git pull --rebase origin "$branch" && git push && exit 0
            echo "push attempt $attempt failed; retrying"
            sleep 5
          done
          echo "could not push after retries; dropping this slot's commit"; exit 0
