name: Daily Pulse

# Refreshes the "Daily Pulse" block in README once a day and commits it
# authored with Shaurya's verified email, so the commit counts toward the
# contribution graph (bot-authored commits do not).

on:
  schedule:
    - cron: "30 3 * * *"   # 03:30 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  pulse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update pulse block
        run: |
          python3 - <<'PY'
          import datetime, re, os

          # Each day rotates a (focus, quote) pair so the pulse AND the commit
          # message both describe what the day is actually about. This keeps the
          # contribution history looking human and intentional, not like a bot
          # stamping the same "chore: daily pulse" line every 24h.
          themes = [
              ("voice agents",        "The best code is the code that writes itself."),
              ("self-learning web",   "Ship it, then make it learn."),
              ("content pipelines",   "Automate the boring, amplify the rare."),
              ("autonomous systems",  "Every project should become an autonomous system."),
              ("agent harnesses",     "Make it work, make it think, make it teach itself."),
              ("client acquisition",  "Small daily commits compound like interest."),
              ("infra & cron",        "A pipeline you trust is a pipeline you forget."),
          ]
          # Verb pool so the commit subject varies day to day as well.
          verbs = ["refresh", "tune", "advance", "log", "update", "iterate on", "note"]

          today = datetime.date.today()
          idx = today.toordinal() % len(themes)
          focus, q = themes[idx]
          verb = verbs[today.toordinal() % len(verbs)]
          stamp = today.strftime("%A, %d %b %Y")
          day_of_year = today.timetuple().tm_yday

          block = (
              f"**{stamp}** &nbsp;•&nbsp; Day {day_of_year} of {today.year} "
              f"&nbsp;•&nbsp; focus: {focus}\n\n"
              f"> _{q}_\n\n"
              f"![Building](https://img.shields.io/badge/status-building%20autonomous%20systems-6366f1?style=flat-square)"
          )
          with open("README.md", encoding="utf-8") as f:
              md = f.read()
          md = re.sub(
              r"<!--PULSE:START-->.*?<!--PULSE:END-->",
              f"<!--PULSE:START-->\n{block}\n<!--PULSE:END-->",
              md, flags=re.S,
          )
          with open("README.md", "w", encoding="utf-8") as f:
              f.write(md)

          # Hand a varied, meaningful commit subject to the next step.
          msg = f"docs(pulse): {verb} {focus} — day {day_of_year}"
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env:
              env.write(f"PULSE_MSG={msg}\n")
          PY

      - name: Commit (attributed to Shaurya)
        run: |
          git config user.name  "Shaur"
          git config user.email "shauryavardhan.shandilya@gmail.com"
          git add README.md
          git commit -m "${PULSE_MSG:-docs: daily pulse $(date -u +%F)}" || echo "no changes"
          git push
